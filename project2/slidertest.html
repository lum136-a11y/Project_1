<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliders</title>
    <style>
        .slider {
        -webkit-appearance: none;
        appearance: none;
        width: 300px;
        height: 8px;
        border-radius: 5px;
        outline: none;
        background-color: rgba(0, 0, 0, 0.176);
        transform: rotate(180deg);
        }

        /* Thumb */
        .slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 8px;
        height: 8px;
        background: #00a6ff;
        border-radius: 50%;
        cursor: pointer;
        }
        .slider-vertical {
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
         #slider2 {
            position: absolute;
            top: 500px;
            left: 0px;
        }
        #slider3 {
            position: absolute;
            top: 600px;
            left: 50px;
        }
    </style>
</head>
<body>
    <input type="range" min="0" max="100" value="0" class="slider" id="slider">
    <input type="range" min="0" max="100" value="20" class="slider slider-vertical" id="slider2">
    <input type="range" min="0" max="100" value="20" class="slider slider-vertical" id="slider3">

    <script>
        const sliders = document.getElementsByClassName("slider");
        let value = 0;

        function animate() {
            value += 0.2;

            if (value >= slider.max) {
                slider.value = slider.max; // 停在終點
                return; // ⛔ 停止動畫（關鍵）
            }

            slider.value = value;

            requestAnimationFrame(animate);
        }

        setTimeout(() => {
            animate();
        }, 2000);
    </script>
</body>
</html>
